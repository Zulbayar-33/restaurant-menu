<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant Menu</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="top-hero">
  <div class="container">
    <h1>🍽️ Restaurant Menu</h1>
    <p>Хоолоо сонгоод захиалга илгээнэ үү</p>
  </div>
</header>

<main class="container py-4">

  <div class="row mb-4">
    <div class="col-md-8">
      <input id="searchInput" class="form-control search-box" placeholder="Хоол хайх...">
    </div>
    <div class="col-md-4 mt-2 mt-md-0">
      <select id="categoryFilter" class="form-select search-box">
        <option value="all">Бүх ангилал</option>
        <option value="Үндсэн хоол">Үндсэн хоол</option>
        <option value="Салат">Салат</option>
        <option value="Ундаа">Ундаа</option>
      </select>
    </div>
  </div>

  <div class="row">
    <div class="col-lg-8">
      <div id="menuList" class="row g-4"></div>
    </div>

    <div class="col-lg-4 mt-4 mt-lg-0">
      <div class="cart-box">
        <h4>🛒 Захиалга</h4>

        <input id="tableNo" class="form-control mb-2" placeholder="Ширээний дугаар">
        <textarea id="note" class="form-control mb-3" placeholder="Тайлбар"></textarea>

        <div id="cartList"></div>

        <div class="total-box mt-3">
          Нийт: <span id="totalPrice">0₮</span>
        </div>

        <button onclick="submitOrder()" class="btn btn-danger w-100 mt-3 order-btn">
          Захиалга илгээх
        </button>

        <div id="message" class="mt-3"></div>
      </div>
    </div>
  </div>

</main>

<script src="app.js"></script>
</body>
</html>
</html>
