<!doctype html>
<html lang="mn">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Restaurant Menu Order</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">🍽️ Restaurant Menu</a>
      <button class="btn btn-light position-relative" data-bs-toggle="offcanvas" data-bs-target="#cartPanel">
        🛒 Cart <span id="cartCount" class="badge bg-danger">0</span>
      </button>
    </div>
  </nav>

  <header class="hero">
    <div class="container">
      <div class="row align-items-center g-4">
        <div class="col-lg-7">
          <p class="badge text-bg-warning px-3 py-2">Online захиалга</p>
          <h1>Монгол хоолны меню</h1>
          <p>Хоолоо сонгоод захиалгаа Google Sheet рүү шууд хадгална.</p>
        </div>
        <div class="col-lg-5">
          <div class="order-box shadow-lg">
            <h5 class="mb-3">Захиалагчийн мэдээлэл</h5>
            <input id="customerName" class="form-control mb-2" placeholder="Нэр">
            <input id="phone" class="form-control mb-2" placeholder="Утасны дугаар">
            <input id="tableNo" class="form-control mb-2" placeholder="Ширээ / Хаяг">
            <textarea id="note" class="form-control" rows="2" placeholder="Тайлбар"></textarea>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="container py-4">
    <div class="d-flex flex-column flex-md-row gap-3 justify-content-between align-items-md-center mb-4">
      <div class="btn-group category-tabs" role="group">
        <button class="btn btn-outline-dark active" data-category="all">Бүгд</button>
        <button class="btn btn-outline-dark" data-category="main">Үндсэн цэс</button>
        <button class="btn btn-outline-dark" data-category="salad">Салат</button>
        <button class="btn btn-outline-dark" data-category="drink">Уух зүйл</button>
      </div>
      <input id="searchInput" class="form-control search" placeholder="Хоол хайх...">
    </div>

    <div id="menuGrid" class="row g-4"></div>
  </main>

  <div class="offcanvas offcanvas-end" tabindex="-1" id="cartPanel">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title">🛒 Миний сагс</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <div id="cartItems"></div>
      <hr>
      <div class="d-flex justify-content-between fs-5 fw-bold">
        <span>Нийт:</span><span id="totalPrice">0₮</span>
      </div>
      <button id="submitBtn" class="btn btn-success w-100 mt-4 py-3">Захиалга илгээх</button>
      <p id="message" class="mt-3 text-center fw-semibold"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
